services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       fleet
      POSTGRES_USER:     fleet
      POSTGRES_PASSWORD: fleet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U fleet"]
      interval:     5s
      timeout:      3s
      retries:      10
      start_period: 5s
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval:     5s
      timeout:      3s
      retries:      12
      start_period: 10s
    restart: unless-stopped

  simulator:
    build: ./simulator
    env_file:
      - ./simulator/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
